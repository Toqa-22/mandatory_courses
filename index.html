<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandatory Course Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: auto; }
        .title { text-align: center; font-size: 50px; color: #0f172a; margin-bottom: 15px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; }
        .top-cards { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; margin-bottom: 40px; }
        #courseCards { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .course-card { width: 220px; background: white; border-radius: 25px; padding: 35px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, .08); }
        .course-name { font-size: 30px; color: #2563eb; margin-bottom: 10px; }
        .course-date-display { font-size: 14px; color: #7c3aed; margin-bottom: 15px; font-weight: bold; }
        .seat-number { font-size: 55px; font-weight: bold; color: #0f172a; }
        .seat-text { color: #64748b; font-size: 18px; }
        .form-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, .08); }
        .form-card h2 { margin-bottom: 30px; color: #0f172a; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 16px; border: 1px solid #d1d5db; border-radius: 15px; font-size: 16px; background-color: white; }
        input:focus, select:focus { outline: none; border-color: #2563eb; }
        .form-group-full { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 8px; }
        .form-group-full label { font-size: 14px; font-weight: bold; color: #334155; }
        
        .dynamic-uploads-wrapper { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .single-upload-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        .single-upload-box label { font-size: 15px; color: #0f172a; font-weight: bold; }
        .single-upload-box label span { color: #dc2626; }
        .file-input { padding: 10px; background: white; border: 1px solid #cbd5e1; cursor: pointer; width: 100%; border-radius: 10px; }
        
        .example-link { display: inline-block; font-size: 13px; color: #7c3aed; font-weight: bold; text-decoration: none; background: #f3e8ff; padding: 4px 10px; border-radius: 6px; width: fit-content; margin-top: 2px; }
        .example-link:hover { background: #e9d5ff; }

        .btn-row { display: flex; margin-top: 30px; }
        .btn-register { flex: 1; padding: 18px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; color: white; font-size: 18px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .btn-register:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Mandatory Course Registration</h1>
        <p class="subtitle">Please input details and select an authorized institution containing slot availability.</p>

        <div class="top-cards">
            <div id="courseCards"></div>
        </div>

        <div class="form-card">
            <h2>Registration Form</h2>
            <div class="form-grid">
                <input type="tel" id="phoneNumber" placeholder="Phone Number" required>
                <input type="text" id="staffName" placeholder="Staff Name" required>
                <input type="text" id="staffNumber" placeholder="Staff Number" required>
                
                <div class="form-group-full">
                    <label for="courseSelect">Choose Target Session Course</label>
                    <select id="courseSelect" onchange="handleCourseSelectionChange()" required>
                        <option value="">-- Choose Course --</option>
                    </select>
                </div>

                <div class="form-group-full">
                    <label for="institutionSelect">Select Your Institution (Only shows those with open quotas for this course)</label>
                    <select id="institutionSelect" required>
                        <option value="">-- Choose Institution --</option>
                    </select>
                </div>
                
                <div class="dynamic-uploads-wrapper" id="dynamicUploadsContainer"></div>
            </div>
            
            <div class="btn-row">
                <button class="btn-register" id="regBtn" onclick="handleSubmit()">Register Now</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let coursesCached = [];
        let quotasMapCached = [];

        async function loadRegistrationFormConfig() {
            const { data: courses, error: courseErr } = await client.from('courses').select('*').order('id', { ascending: true });
            if (courseErr) return console.log("Database fetch error:", courseErr);
            coursesCached = courses;

            const { data: quotas, error: quotaErr } = await client.from('course_institutions').select(`
                id, course_id, institution_id, max_slots, registered_count,
                institutions(name)
            `);
            if (quotaErr) return console.log("Quota matrix error:", quotaErr);
            quotasMapCached = quotas || [];

            document.getElementById('courseCards').innerHTML = courses.map(course => {
                const labels = Array.isArray(course.file_labels) ? course.file_labels : ["Required Document"];
                return `
                    <div class="course-card">
                        <div class="course-name">${course.name}</div>
                        <div class="course-date-display">🗓️ ${course.course_date}</div>
                        <div class="seat-number">${course.seats}</div>
                        <div class="seat-text">Chairs Available</div>
                        <div style="font-size:12px; margin-top:8px; color:#64748b; font-weight:bold;">Requires: ${labels.length} file(s)</div>
                    </div>
                `;
            }).join('');

            const selectableCourses = courses.filter(c => c.seats > 0);
            document.getElementById('courseSelect').innerHTML = '<option value="">-- Choose Course --</option>' + 
                selectableCourses.map(c => `<option value="${c.id}">${c.name} (🗓️ ${c.course_date}) (${c.seats} chairs left)</option>`).join('');

            handleCourseSelectionChange();
        }

        window.handleCourseSelectionChange = function() {
            const courseId = Number(document.getElementById('courseSelect').value);
            const instDropdown = document.getElementById('institutionSelect');
            
            if (!courseId) {
                instDropdown.innerHTML = '<option value="">-- Choose Institution --</option>';
                document.getElementById('dynamicUploadsContainer').innerHTML = '<div style="color: #64748b; padding: 10px;">No available session course selected.</div>';
                return;
            }

            const courseSpecificQuotas = quotasMapCached.filter(q => q.course_id === courseId && q.registered_count < q.max_slots);
            
            instDropdown.innerHTML = '<option value="">-- Choose Institution --</option>' + 
                courseSpecificQuotas.map(q => {
                    const remaining = q.max_slots - q.registered_count;
                    const name = q.institutions?.name || 'Unknown Institution';
                    return `<option value="${q.institution_id}" data-quota-id="${q.id}">${name} (${remaining} slots available)</option>`;
                }).join('');

            const selectedCourse = coursesCached.find(c => c.id === courseId);
            const container = document.getElementById('dynamicUploadsContainer');
            
            const labels = selectedCourse && Array.isArray(selectedCourse.file_labels) && selectedCourse.file_labels.length > 0 
                ? selectedCourse.file_labels 
                : ["Required Document"];
                
            const examples = selectedCourse && Array.isArray(selectedCourse.file_examples) 
                ? selectedCourse.file_examples 
                : [];
            
            container.innerHTML = labels.map((descText, idx) => {
                const exampleUrl = examples[idx] || '';
                const exampleLinkHtml = exampleUrl 
                    ? `<a href="${exampleUrl}" target="_blank" class="example-link">🔍 View Example Template</a>` 
                    : '';

                return `
                    <div class="single-upload-box">
                        <label>Upload Document #${idx + 1}: <span>${descText} *</span></label>
                        <input type="file" class="file-input custom-file-target" data-label="${descText}" accept="image/*, .pdf" required>
                        ${exampleLinkHtml}
                    </div>
                `;
            }).join('');
        };

        window.handleSubmit = async function () {
            const regBtn = document.getElementById('regBtn');
            const phoneNumber = document.getElementById('phoneNumber').value;
            const staffName   = document.getElementById('staffName').value;
            const staffNumber = document.getElementById('staffNumber').value;
            const instDropdown = document.getElementById('institutionSelect');
            const institutionId = instDropdown.value;
            const courseId    = Number(document.getElementById('courseSelect').value);
            
            const selectedOption = instDropdown.options[instDropdown.selectedIndex];
            const ruleMappingId = selectedOption ? Number(selectedOption.getAttribute('data-quota-id')) : null;
            
            const fileInputs  = document.querySelectorAll('.custom-file-target');

            if (!phoneNumber || !staffName || !staffNumber || !institutionId || !courseId || !ruleMappingId) {
                alert("Please complete all text fields and drop down selections.");
                return;
            }

            for (let input of fileInputs) {
                if (!input.files || input.files.length === 0) {
                    alert(`Registration denied! Missing file target object: "${input.getAttribute('data-label')}"`);
                    return;
                }
            }

            regBtn.disabled = true;
            regBtn.innerText = "Processing server storage sequence uploads...";

            try {
                const currentCourse = coursesCached.find(c => c.id === courseId);
                
                const { data: realTimeRule, error: checkErr } = await client.from('course_institutions')
                    .select('id, max_slots, registered_count, institutions(name)')
                    .eq('id', ruleMappingId)
                    .single();

                if (checkErr || !realTimeRule) throw new Error("Could not verify your institution quota settings configuration.");
                if (realTimeRule.registered_count >= realTimeRule.max_slots) {
                    throw new Error(`The allocation quota pool context has reached max limit bounds.`);
                }

                const uploadedUrls = [];
                for (let i = 0; i < fileInputs.length; i++) {
                    const currentFile = fileInputs[i].files[0];
                    const fileExtension = currentFile.name.split('.').pop();
                    const cleanLabel = fileInputs[i].getAttribute('data-label').replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    const uniqueFileName = `${Date.now()}_${cleanLabel}_${Math.random().toString(36).substring(7)}.${fileExtension}`;

                    const { error: uploadError } = await client.storage
                        .from('registration-files')
                        .upload(uniqueFileName, currentFile);

                    if (uploadError) throw new Error(`Upload Failed: ` + uploadError.message);

                    const { data: publicUrlData } = client.storage
                        .from('registration-files')
                        .getPublicUrl(uniqueFileName);

                    uploadedUrls.push(publicUrlData.publicUrl);
                }

                const { error: insertError } = await client.from('registrations').insert({
                    phone_number: phoneNumber,
                    staff_name: staffName,
                    staff_number: staffNumber,
                    institution_id: Number(institutionId),
                    institution_name_snapshot: realTimeRule.institutions?.name || "Institution Context",
                    course_id: courseId,
                    file_urls: uploadedUrls
                });

                if (insertError) throw new Error("Database Write Error: " + insertError.message);

                await client.from('courses').update({ seats: currentCourse.seats - 1 }).eq('id', courseId);
                await client.from('course_institutions').update({ registered_count: realTimeRule.registered_count + 1 }).eq('id', ruleMappingId);

                alert('Registration verified and successfully logged!');
                document.getElementById('phoneNumber').value = '';
                document.getElementById('staffName').value   = '';
                document.getElementById('staffNumber').value = '';
                document.getElementById('courseSelect').value = '';
                
                await loadRegistrationFormConfig();

            } catch (err) {
                alert(err.message || "An error occurred.");
            } finally {
                regBtn.disabled = false;
                regBtn.innerText = "Register Now";
            }
        };

        loadRegistrationFormConfig();
    </script>
</body>
</html>
