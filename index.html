<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandatory Course</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fc;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .title {
            text-align: center;
            font-size: 50px;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
        }

        .top-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
        }

        #courseCards {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .course-card,
        .date-card {
            width: 220px;
            background: white;
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
            transition: .3s;
        }

        .course-card:hover,
        .date-card:hover {
            transform: translateY(-8px);
        }

        .course-name {
            font-size: 30px;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .course-date-display {
            font-size: 14px;
            color: #7c3aed;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .seat-number {
            font-size: 55px;
            font-weight: bold;
            color: #0f172a;
        }

        .seat-text {
            color: #64748b;
            font-size: 18px;
        }

        .date-card h2 {
            color: #3b2602;
            margin-bottom: 20px;
        }

        .date-card p {
            font-size: 22px;
            color: #2563eb;
            font-weight: bold;
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        .form-card h2 {
            margin-bottom: 30px;
            color: #0f172a;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        input, select {
            width: 100%;
            padding: 16px;
            border: 1px solid #d1d5db;
            border-radius: 15px;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
        }

        /* File input custom wrapper styling */
        .file-upload-wrapper {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-upload-wrapper label {
            font-size: 15px;
            color: #475569;
            font-weight: bold;
            padding-left: 5px;
        }

        .file-input {
            padding: 12px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            cursor: pointer;
        }

        .file-input:focus {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-register {
            flex: 1;
            padding: 18px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 15px;
            cursor: pointer;
        }

        .btn-register:hover {
            opacity: .9;
        }

        .btn-view {
            flex: 1;
            padding: 18px;
            background: white;
            border: 2px solid #2563eb;
            color: #2563eb;
            font-size: 18px;
            border-radius: 15px;
            cursor: pointer;
        }

        .btn-view:hover {
            background: #eff6ff;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1 class="title">Mandatory Course</h1>
        <p class="subtitle">Please fill the form below to register.</p>

        <div class="top-cards">
            <div id="courseCards"></div>
            <div class="date-card">
                <h2>Selected Course Date</h2>
                <p id="todayDate">Select a course...</p>
            </div>
        </div>

        <div class="form-card">
            <h2>Registration Form</h2>
            <div class="form-grid">
                <input type="tel" id="phoneNumber" placeholder="Phone Number">
                <input type="text" id="staffName" placeholder="Staff Name">
                <input type="text" id="staffNumber" placeholder="Staff Number">
                <input type="text" id="institution" placeholder="Institution">
                <select id="courseSelect" onchange="updateSelectedDate()"></select>
                
                <div class="file-upload-wrapper">
                    <label for="fileUpload">Upload Document / Image</label>
                    <input type="file" id="fileUpload" class="file-input" accept="image/*, .pdf, .doc, .docx">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn-register" onclick="handleSubmit()">Register Now</button>
                <button class="btn-view" onclick="window.location.href='registrations.html'">View Registrations</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let cachedCourses = [];

        async function loadCourses() {
            const { data, error } = await client.from('courses').select('*');

            if (error) {
                console.log("Database fetch error:", error);
                return;
            }

            cachedCourses = data;

            document.getElementById('courseCards').innerHTML = data.map(course => `
                <div class="course-card">
                    <div class="course-name">${course.name}</div>
                    <div class="course-date-display">🗓️ ${course.course_date || 'TBD'}</div>
                    <div class="seat-number">${course.seats}</div>
                    <div class="seat-text">Chairs</div>
                </div>
            `).join('');

            const selectableCourses = data.filter(c => c.seats > 0);
            document.getElementById('courseSelect').innerHTML = selectableCourses
                .map(c => `<option value="${c.id}">${c.name} (${c.seats} chairs)</option>`)
                .join('');

            updateSelectedDate();
        }

        window.updateSelectedDate = function() {
            const selectEl = document.getElementById('courseSelect');
            const selectedId = Number(selectEl.value);
            const chosenCourse = cachedCourses.find(c => c.id === selectedId);
            
            if (chosenCourse) {
                document.getElementById('todayDate').innerHTML = chosenCourse.course_date || 'TBD';
            } else {
                document.getElementById('todayDate').innerHTML = 'N/A';
            }
        }

        loadCourses();

        window.handleSubmit = async function () {
            const phoneNumber = document.getElementById('phoneNumber').value;
            const staffName   = document.getElementById('staffName').value;
            const staffNumber = document.getElementById('staffNumber').value;
            const institution = document.getElementById('institution').value;
            const courseId    = Number(document.getElementById('courseSelect').value);
            const fileInput   = document.getElementById('fileUpload');
            const attachedFile = fileInput.files[0];

            if (!phoneNumber || !staffName || !staffNumber || !institution || !courseId) {
                alert("Please fill in all textual fields.");
                return;
            }

            // Note: If you want to strictly require a file, check `if (!attachedFile)` here.

            const { data: course, error } = await client
                .from('courses')
                .select('*')
                .eq('id', courseId)
                .single();

            if (error || !course) {
                alert("Could not find the selected course.");
                return;
            }

            if (course.seats <= 0) {
                alert('No seats available for this course.');
                return;
            }

            // Database insert payload prepared with phone_number instead of student_name
            await client.from('registrations').insert({
                phone_number: phoneNumber,
                staff_name:   staffName,
                staff_number: staffNumber,
                institution:  institution,
                course_id:    courseId
            });

            await client.from('courses')
                .update({ seats: course.seats - 1 })
                .eq('id', courseId);

            alert('Registration saved successfully!');

            document.getElementById('phoneNumber').value = '';
            document.getElementById('staffName').value   = '';
            document.getElementById('staffNumber').value = '';
            document.getElementById('institution').value = '';
            fileInput.value = ''; // Resets file selection

            loadCourses();
        }
    </script>

</body>
</html>
