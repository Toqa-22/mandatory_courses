<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f8fafc; color: #0f172a; padding: 30px 15px; }
        .wrapper { max-width: 650px; margin: auto; }
        .form-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        h2 { font-size: 22px; margin-bottom: 20px; color: #1e293b; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #475569; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; background: #fff; transition: all 0.2s; }
        input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px #dbeafe; }
        
        .upload-row { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .upload-row p { font-size: 13px; color: #64748b; margin-bottom: 8px; }
        .upload-row a { font-size: 12px; color: #2563eb; text-decoration: none; font-weight: bold; }
        .upload-row a:hover { text-decoration: underline; }
        
        .no-attachments-msg { background: #f0fdf4; border: 1px dashed #22c55e; color: #15803d; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 14px; }
        
        .btn-submit { width: 100%; padding: 15px; background: #2563eb; border: none; color: white; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #1d4ed8; }
        .info-text { font-size: 12px; color: #64748b; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <form id="enrollmentForm">
            <div class="form-card">
                <h2>👤 Applicant Particulars Context</h2>
                <div class="form-group">
                    <label>Full Staff Name</label>
                    <input type="text" id="staffName" placeholder="Enter your full legal name" required>
                </div>
                <div class="form-group">
                    <label>Staff Identification Number</label>
                    <input type="text" id="staffNumber" placeholder="e.g., ST-99281" required>
                </div>
                <div class="form-group">
                    <label>Contact Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="e.g., +968 9123 4567" required>
                </div>
                <div class="form-group">
                    <label>Institution Name</label>
                    <input type="text" id="instName" placeholder="e.g., Ibra Regional Hospital" required>
                </div>
                <div class="form-group">
                    <label>Designation Snapshot</label>
                    <input type="text" id="designation" placeholder="e.g., Registered Staff Nurse" required>
                </div>
                <div class="form-group">
                    <label>Specialization Domain</label>
                    <input type="text" id="specialization" placeholder="e.g., Intensive Care / Pediatrics" required>
                </div>
            </div>

            <div class="form-card">
                <h2>📚 Target Selection</h2>
                <div class="form-group">
                    <label>Choose Program Room Space</label>
                    <select id="courseSelect" onchange="handleCourseSelectionChange()" required>
                        <option value="">-- Synchronizing Available Courses --</option>
                    </select>
                </div>
            </div>

            <div class="form-card" id="attachmentFormCard">
                <h2>📂 Required Verification Materials</h2>
                <div id="dynamicUploadsContainer"></div>
            </div>

            <button type="submit" class="btn-submit">Transmit Form Registration</button>
            <p class="info-text">Secure submission gateway connection authenticated into backend registers.</p>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let systemCoursesMemory = [];

        async function initPortalDropdown() {
            const { data, error } = await client.from('courses').select('*').order('id', { ascending: true });
            if (error) {
                alert("Matrix initialization failure: " + error.message);
                return;
            }
            systemCoursesMemory = data || [];
            
            const selectElement = document.getElementById('courseSelect');
            selectElement.innerHTML = '<option value="">-- Choose Course Workspace Room --</option>' + 
                systemCoursesMemory.map(c => `<option value="${c.id}">${c.name} (🗓️ ${c.course_date})</option>`).join('');
            
            handleCourseSelectionChange();
        }

        window.handleCourseSelectionChange = function() {
            const selectElement = document.getElementById('courseSelect');
            const targetCard = document.getElementById('attachmentFormCard');
            const container = document.getElementById('dynamicUploadsContainer');
            
            const selectedId = Number(selectElement.value);
            if (!selectedId) {
                targetCard.style.display = 'none';
                container.innerHTML = '';
                return;
            }

            const chosenCourse = systemCoursesMemory.find(c => c.id === selectedId);
            
            // Check if attachments are explicitly disabled (count is 0 or array is blank)
            const fileLabels = Array.isArray(chosenCourse.file_labels) ? chosenCourse.file_labels : [];
            const fileCount = chosenCourse.required_files !== undefined ? chosenCourse.required_files : fileLabels.length;

            if (fileCount === 0 || fileLabels.length === 0) {
                // HIDE the upload section card completely or show a simple placeholder message
                targetCard.style.display = 'block';
                container.innerHTML = `<div class="no-attachments-msg">🎉 This course requires no digital file attachments. Simply submit your form!</div>`;
                return;
            }

            // Otherwise, reveal upload rows natively
            targetCard.style.display = 'block';
            const examples = Array.isArray(chosenCourse.file_examples) ? chosenCourse.file_examples : [];
            
            let uploadHtml = '';
            fileLabels.forEach((label, idx) => {
                const exampleUrl = examples[idx];
                const exampleLinkHtml = exampleUrl ? `<br><a href="${exampleUrl}" target="_blank">📥 Click to Download Sample Template</a>` : '';
                
                uploadHtml += `
                    <div class="upload-row">
                        <label>Slot #${idx + 1}: ${label} *</label>
                        <p>Please select your file object file below (PDF, PNG, JPG).${exampleLinkHtml}</p>
                        <input type="file" class="applicant-file-input" data-label="${label}" required>
                    </div>
                `;
            });
            container.innerHTML = uploadHtml;
        };

        document.getElementById('enrollmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const courseId = Number(document.getElementById('courseSelect').value);
            if (!courseId) return alert("Please select a valid program destination.");

            const chosenCourse = systemCoursesMemory.find(c => c.id === courseId);
            const fileLabels = Array.isArray(chosenCourse.file_labels) ? chosenCourse.file_labels : [];
            const fileCount = chosenCourse.required_files !== undefined ? chosenCourse.required_files : fileLabels.length;

            const staff_name = document.getElementById('staffName').value.trim();
            const staff_number = document.getElementById('staffNumber').value.trim();
            const phone_number = document.getElementById('phoneNumber').value.trim();
            const institution_name_snapshot = document.getElementById('instName').value.trim();
            const designation_snapshot = document.getElementById('designation').value.trim();
            const specialization_snapshot = document.getElementById('specialization').value.trim();

            let uploadedUrlsArray = [];

            // Process uploads only if files are needed
            if (fileCount > 0 && fileLabels.length > 0) {
                const fileInputs = document.querySelectorAll('.applicant-file-input');
                
                for (let input of fileInputs) {
                    const fileObj = input.files[0];
                    if (!fileObj) {
                        alert("Please upload all required documentation files before submission.");
                        return;
                    }
                    
                    // Create clean file name structure paths
                    const cleanFileName = `${Date.now()}_${staff_number}_${fileObj.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
                    
                    const { data: uploadData, error: uploadErr } = await client.storage
                        .from('registrations')
                        .upload(cleanFileName, fileObj);

                    if (uploadErr) {
                        alert(`Storage core upload fault: ${uploadErr.message}`);
                        return;
                    }

                    const { data: publicUrlData } = client.storage
                        .from('registrations')
                        .getPublicUrl(cleanFileName);

                    uploadedUrlsArray.push(publicUrlData.publicUrl);
                }
            }

            // Push enrollment entry metadata straight to Supabase Table
            const { error: insertErr } = await client.from('registrations').insert({
                course_id: courseId,
                staff_name,
                staff_number,
                phone_number,
                institution_name_snapshot,
                designation_snapshot,
                specialization_snapshot,
                file_urls: uploadedUrlsArray // Saves as empty array [] if no file attachments exist
            });

            if (insertErr) {
                alert("Database transactional validation fault: " + insertErr.message);
            } else {
                alert("Registration records finalized and transmitted securely!");
                document.getElementById('enrollmentForm').reset();
                handleCourseSelectionChange();
            }
        });

        initPortalDropdown();
    </script>
</body>
</html>
