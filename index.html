<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isolated System Registration Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 900px; margin: auto; }
        .form-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,.06); }
        h1 { margin-bottom: 5px; color: #0f172a; }
        .sub { color: #64748b; margin-bottom: 30px; font-size: 14px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 14px; font-weight: bold; color: #334155; }
        input, select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; }
        .box-upload { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 12px; }
        .btn-register { width: 100%; padding: 16px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; color: white; font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-card">
            <h1>Session Enrollment</h1>
            <p class="sub">Institutions are dynamically gated individually per selected course availability room structural tracking maps.</p>
            
            <div class="form-grid">
                <div class="form-group"><label>Staff Name</label><input type="text" id="staffName" required></div>
                <div class="form-group"><label>Staff Number</label><input type="text" id="staffNumber" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="phoneNumber" required></div>
                
                <div class="form-group">
                    <label>Target Course Session</label>
                    <select id="courseSelect" onchange="handleCourseChange()" required>
                        <option value="">-- Select Course Room --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Your Institution (Filtered for Selected Course)</label>
                    <select id="institutionSelect" required>
                        <option value="">-- Select Course First --</option>
                    </select>
                </div>

                <div id="fileUploadsContainer" class="form-grid"></div>
            </div>

            <button class="btn-register" id="regBtn" onclick="processRegistration()">Submit Registration</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let activeCourses = [];

        async function fetchInitialCourses() {
            const { data } = await client.from('courses').select('*').gt('seats', 0).order('id', { ascending: true });
            activeCourses = data || [];
            document.getElementById('courseSelect').innerHTML = '<option value="">-- Select Course Room --</option>' + 
                activeCourses.map(c => `<option value="${c.id}">${c.name} (${c.seats} seats open)</option>`).join('');
        }

        window.handleCourseChange = async function() {
            const courseId = Number(document.getElementById('courseSelect').value);
            const instDropdown = document.getElementById('institutionSelect');
            const fileContainer = document.getElementById('fileUploadsContainer');
            
            if (!courseId) {
                instDropdown.innerHTML = '<option value="">-- Select Course First --</option>';
                fileContainer.innerHTML = '';
                return;
            }

            // 1. Render custom requested file inputs
            const matchedCourse = activeCourses.find(c => c.id === courseId);
            const labels = matchedCourse?.file_labels || ["Required Document"];
            fileContainer.innerHTML = labels.map((label, idx) => `
                <div class="box-upload">
                    <label>Upload Target #${idx + 1}: ${label} *</label>
                    <input type="file" class="upload-file-field" data-label="${label}" accept="image/*,.pdf" required>
                </div>
            `).join('');

            // 2. Fetch Institutions authorized *only* for this specific Course ID
            // Filters out institutions where registered_count >= max_slots
            const { data: limits } = await client.from('course_institutions')
                .select('id, max_slots, registered_count, institutions(id, name)')
                .eq('course_id', courseId);

            const openSelections = (limits || []).filter(l => l.registered_count < l.max_slots);

            if(openSelections.length === 0) {
                instDropdown.innerHTML = '<option value="">❌ No institutions have available quotas for this course</option>';
            } else {
                instDropdown.innerHTML = '<option value="">-- Select Your Institution --</option>' + 
                    openSelections.map(l => `<option value="${l.institutions.id}" data-mapid="${l.id}">${l.institutions.name} (${l.max_slots - l.registered_count} seats left)</option>`).join('');
            }
        };

        window.processRegistration = async function() {
            const btn = document.getElementById('regBtn');
            const courseId = Number(document.getElementById('courseSelect').value);
            const instSelect = document.getElementById('institutionSelect');
            const instId = Number(instSelect.value);
            const selectedOpt = instSelect.options[instSelect.selectedIndex];
            const mappingId = selectedOpt?.getAttribute('data-mapid');
            
            const name = document.getElementById('staffName').value.trim();
            const num = document.getElementById('staffNumber').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const fileInputs = document.querySelectorAll('.upload-file-field');

            if (!name || !num || !phone || !courseId || !instId) return alert("Fill all required fields.");

            // File field checks
            for (let input of fileInputs) {
                if (!input.files[0]) return alert(`Missing uploaded item: ${input.getAttribute('data-label')}`);
            }

            btn.disabled = true;
            btn.innerText = "Uploading files and confirming slot allocations...";

            try {
                // 1. Process bucket file assets 
                const urls = [];
                for (let input of fileInputs) {
                    const file = input.files[0];
                    const ext = file.name.split('.').pop();
                    const pathName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${ext}`;
                    
                    const { error: upErr } = await client.storage.from('registration-files').upload(pathName, file);
                    if (upErr) throw upErr;

                    urls.push(client.storage.from('registration-files').getPublicUrl(pathName).data.publicUrl);
                }

                // 2. Check the specific course institution mapping record
                const { data: mapRecord } = await client.from('course_institutions').select('registered_count, max_slots').eq('id', mappingId).single();
                if (mapRecord.registered_count >= mapRecord.max_slots) throw new Error("This institution quota limit for this specific course was filled just now!");

                // 3. Save standard data log row entry
                await client.from('registrations').insert({
                    phone_number: phone, staff_name: name, staff_number: num,
                    course_id: courseId, institution_id: instId,
                    institution_name_snapshot: selectedOpt.text.split(' (')[0]
                });

                // 4. Update capacities counts references variables
                const currentCourse = activeCourses.find(c => c.id === courseId);
                await client.from('courses').update({ seats: currentCourse.seats - 1 }).eq('id', courseId);
                await client.from('course_institutions').update({ registered_count: mapRecord.registered_count + 1 }).eq('id', mappingId);

                alert("Registration complete!");
                location.reload();
            } catch(e) {
                alert("Error handling execution data bounds: " + e.message);
                btn.disabled = false;
                btn.innerText = "Submit Registration";
            }
        };

        fetchInitialCourses();
    </script>
</body>
</html>
