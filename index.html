<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandatory Course Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1200px; margin: auto; }
        .title { text-align: center; font-size: 50px; color: #0f172a; margin-bottom: 15px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 40px; }
        .top-cards { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; margin-bottom: 40px; }
        #courseCards { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .course-card { width: 220px; background: white; border-radius: 25px; padding: 35px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, .08); transition: .3s; }
        .course-name { font-size: 30px; color: #2563eb; margin-bottom: 10px; }
        .course-date-display { font-size: 14px; color: #7c3aed; margin-bottom: 15px; font-weight: bold; }
        .seat-number { font-size: 55px; font-weight: bold; color: #0f172a; }
        .seat-text { color: #64748b; font-size: 18px; }
        .form-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, .08); }
        .form-card h2 { margin-bottom: 30px; color: #0f172a; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        input, select { width: 100%; padding: 16px; border: 1px solid #d1d5db; border-radius: 15px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #2563eb; }
        
        .dynamic-uploads-wrapper { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .single-upload-box { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 8px; }
        .single-upload-box label { font-size: 15px; color: #0f172a; font-weight: bold; }
        .single-upload-box label span { color: #dc2626; }
        .file-input { padding: 10px; background: white; border: 1px solid #cbd5e1; cursor: pointer; width: 100%; border-radius: 10px; }
        
        .btn-row { display: flex; margin-top: 30px; }
        .btn-register { flex: 1; padding: 18px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; color: white; font-size: 18px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .btn-register:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Mandatory Course</h1>
        <p class="subtitle">Please fill the form below to register.</p>

        <div class="top-cards">
            <div id="courseCards"></div>
        </div>

        <div class="form-card">
            <h2>Registration Form</h2>
            <div class="form-grid">
                <input type="tel" id="phoneNumber" placeholder="Phone Number">
                <input type="text" id="staffName" placeholder="Staff Name">
                <input type="text" id="staffNumber" placeholder="Staff Number">
                <input type="text" id="institution" placeholder="Institution">
                <select id="courseSelect" onchange="renderDynamicUploadBoxes()"></select>
                
                <div class="dynamic-uploads-wrapper" id="dynamicUploadsContainer"></div>
            </div>
            
            <div class="btn-row">
                <button class="btn-register" id="regBtn" onclick="handleSubmit()">Register Now</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let coursesCached = [];

        async function loadCourses() {
            const { data, error } = await client.from('courses').select('*').order('id', { ascending: true });
            if (error) return console.log("Database fetch error:", error);

            coursesCached = data;

            document.getElementById('courseCards').innerHTML = data.map(course => {
                // Read exact count of files needed
                let count = 1;
                if (course.required_files !== undefined) {
                    count = course.required_files;
                } else if (Array.isArray(course.file_labels)) {
                    count = course.file_labels.length;
                }

                return `
                    <div class="course-card">
                        <div class="course-name">${course.name}</div>
                        <div class="course-date-display">🗓️ ${course.course_date}</div>
                        <div class="seat-number">${course.seats}</div>
                        <div class="seat-text">Chairs Available</div>
                        <div style="font-size:12px; margin-top:8px; color:#64748b; font-weight:bold;">Requires: ${count} file(s)</div>
                    </div>
                `;
            }).join('');

            const selectableCourses = data.filter(c => c.seats > 0);
            document.getElementById('courseSelect').innerHTML = selectableCourses
                .map(c => `<option value="${c.id}">${c.name} (${c.seats} chairs)</option>`)
                .join('');

            renderDynamicUploadBoxes();
        }

        window.renderDynamicUploadBoxes = function() {
            const selectedId = Number(document.getElementById('courseSelect').value);
            const selectedCourse = coursesCached.find(c => c.id === selectedId);
            const container = document.getElementById('dynamicUploadsContainer');
            
            if (!selectedCourse) {
                container.innerHTML = '<div style="color: #64748b; padding: 10px;">No available course chosen.</div>';
                return;
            }

            // Fallback strategy to find exactly how many boxes to build
            let count = 1;
            if (selectedCourse.required_files !== undefined) {
                count = selectedCourse.required_files;
            } else if (Array.isArray(selectedCourse.file_labels)) {
                count = selectedCourse.file_labels.length;
            }

            // Create a dedicated upload input element box loop matching the exact configuration number
            let htmlPayload = '';
            for (let i = 1; i <= count; i++) {
                htmlPayload += `
                    <div class="single-upload-box">
                        <label>Upload Required Document #${i} <span>*</span></label>
                        <input type="file" class="file-input custom-file-target" data-label="Document #${i}" accept="image/*, .pdf" required>
                    </div>
                `;
            }
            container.innerHTML = htmlPayload;
        };

        window.handleSubmit = async function () {
            const regBtn = document.getElementById('regBtn');
            const phoneNumber = document.getElementById('phoneNumber').value;
            const staffName   = document.getElementById('staffName').value;
            const staffNumber = document.getElementById('staffNumber').value;
            const institution = document.getElementById('institution').value;
            const courseId    = Number(document.getElementById('courseSelect').value);
            
            const fileInputs  = document.querySelectorAll('.custom-file-target');

            if (!phoneNumber || !staffName || !staffNumber || !institution || !courseId) {
                alert("Please fill in all text fields.");
                return;
            }

            // Ensure every displayed dynamic input element actually has a file chosen
            const uploadedUrls = [];
            for (let input of fileInputs) {
                if (!input.files || input.files.length === 0) {
                    alert(`Registration denied! You missed uploading: ${input.getAttribute('data-label')}`);
                    return;
                }
            }

            regBtn.disabled = true;
            regBtn.innerText = "Uploading files sequentially...";

            try {
                const currentCourse = coursesCached.find(c => c.id === courseId);

                // Run sequential loops to process files one by one cleanly into storage buckets
                for (let i = 0; i < fileInputs.length; i++) {
                    const currentFile = fileInputs[i].files[0];
                    const fileExtension = currentFile.name.split('.').pop();
                    const cleanLabel = fileInputs[i].getAttribute('data-label').replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    const uniqueFileName = `${Date.now()}_${cleanLabel}_${Math.random().toString(36).substring(7)}.${fileExtension}`;

                    const { data: uploadData, error: uploadError } = await client.storage
                        .from('registration-files')
                        .upload(uniqueFileName, currentFile);

                    if (uploadError) throw new Error(`Upload Failed for ${fileInputs[i].getAttribute('data-label')}: ` + uploadError.message);

                    const { data: publicUrlData } = client.storage
                        .from('registration-files')
                        .getPublicUrl(uniqueFileName);

                    uploadedUrls.push(publicUrlData.publicUrl);
                }

                // Insert user details along with the collection of secure public file URLs
                const { error: insertError } = await client.from('registrations').insert({
                    phone_number: phoneNumber,
                    staff_name: staffName,
                    staff_number: staffNumber,
                    institution: institution,
                    course_id: courseId,
                    file_urls: uploadedUrls
                });

                if (insertError) throw new Error("Database Write Error: " + insertError.message);

                // Decrease the remaining course chair seats count by 1
                await client.from('courses')
                    .update({ seats: currentCourse.seats - 1 })
                    .eq('id', courseId);

                alert('Registration successfully verified and completed!');

                // Clear input texts clean
                document.getElementById('phoneNumber').value = '';
                document.getElementById('staffName').value   = '';
                document.getElementById('staffNumber').value = '';
                document.getElementById('institution').value = '';
                
                // Refresh data caches to properly re-render fresh layouts
                await loadCourses();

            } catch (err) {
                console.error(err);
                alert(err.message || "An unexpected processing issue occurred.");
            } finally {
                regBtn.disabled = false;
                regBtn.innerText = "Register Now";
            }
        };

        loadCourses();
    </script>
</body>
</html>
