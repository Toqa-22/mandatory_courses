<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; min-height: 100vh; padding: 40px 20px; color: #0f172a; }
        .container { max-width: 600px; margin: auto; }
        .title { text-align: center; font-size: 36px; color: #0f172a; margin-bottom: 10px; font-weight: bold; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 16px; }
        
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,.06); margin-bottom: 30px; }
        .card h2 { margin-bottom: 20px; color: #0f172a; font-size: 22px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #334155; font-size: 14px; font-weight: bold; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; background: white; }
        input:focus, select:focus { outline: none; border-color: #2563eb; }
        
        .descriptions-panel { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; flex-direction: column; gap: 15px; }
        .descriptions-panel h4 { font-size: 13px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .desc-row { background: white; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 8px; }
        .desc-row span { font-size: 13px; color: #2563eb; font-weight: bold; }
        .desc-row p { font-size: 13px; color: #64748b; }
        .desc-row a { font-size: 12px; color: #2563eb; text-decoration: none; font-weight: bold; width: fit-content; }
        .desc-row a:hover { text-decoration: underline; }
        .desc-row input[type="file"] { border: none; padding: 5px 0; background: transparent; }

        .no-attachments-badge { background: #f0fdf4; color: #16a34a; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; text-align: center; border: 1px dashed #22c55e; }

        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(90deg, #2563eb, #7c3aed); border: none; color: white; font-size: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">Course Registration</h1>
        <p class="subtitle">Fill out your information below to register for the upcoming sessions.</p>

        <form id="enrollmentForm">
            <div class="card">
                <h2>Select Course</h2>
                <div class="form-group">
                    <label>Target Course Room Scope</label>
                    <select id="courseSelect" onchange="handleCourseSelectionChange()" required>
                        <option value="">-- Synchronizing Available Courses --</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <h2>Staff Information</h2>
                <div class="form-group">
                    <label>Full Staff Name</label>
                    <input type="text" id="staffName" placeholder="e.g., Jane Doe" required>
                </div>
                <div class="form-group">
                    <label>Staff Identification Number</label>
                    <input type="text" id="staffNumber" placeholder="e.g., ST-12345" required>
                </div>
                <div class="form-group">
                    <label>Contact Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="e.g., +968 9000 0000" required>
                </div>
                <div class="form-group">
                    <label>Institution Official Name</label>
                    <input type="text" id="instName" placeholder="e.g., City Medical General Hospital" required>
                </div>
                <div class="form-group">
                    <label>Designation Snapshot</label>
                    <input type="text" id="designation" placeholder="e.g., Medical Officer / Nurse" required>
                </div>
                <div class="form-group">
                    <label>Specialization Domain</label>
                    <input type="text" id="specialization" placeholder="e.g., Cardiology / General" required>
                </div>
            </div>

            <div class="card" id="attachmentFormCard">
                <h2>Required Verification Materials</h2>
                <div class="descriptions-panel" id="descriptionsWrapper">
                    <h4 id="attachmentPanelHeader">Document Descriptions & Examples</h4>
                    <div id="dynamicUploadsContainer"></div>
                </div>
            </div>

            <button type="submit" class="btn-submit">Submit Registration</button>
        </form>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const client = createClient(
            "https://pqgkdnxdsybcfamwadrf.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZ2tkbnhkc3liY2ZhbXdhZHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzE0NjUsImV4cCI6MjA5NzEwNzQ2NX0.lugWuqNI5VMy6hCn-y38-hi825pIHcUjOCAWCsMJz4c"
        );

        let systemCoursesMemory = [];

        async function initPortalDropdown() {
            const { data, error } = await client.from('courses').select('*').order('id', { ascending: true });
            if (error) {
                alert("Matrix initialization failure: " + error.message);
                return;
            }
            systemCoursesMemory = data || [];
            
            const selectElement = document.getElementById('courseSelect');
            selectElement.innerHTML = '<option value="">-- Choose Course Workspace Room --</option>' + 
                systemCoursesMemory.map(c => `<option value="${c.id}">${c.name} (🗓️ ${c.course_date})</option>`).join('');
            
            handleCourseSelectionChange();
        }

        window.handleCourseSelectionChange = function() {
            const selectElement = document.getElementById('courseSelect');
            const targetCard = document.getElementById('attachmentFormCard');
            const container = document.getElementById('dynamicUploadsContainer');
            const panelHeader = document.getElementById('attachmentPanelHeader');
            const wrapper = document.getElementById('descriptionsWrapper');
            
            const selectedId = Number(selectElement.value);
            if (!selectedId) {
                targetCard.style.display = 'none';
                container.innerHTML = '';
                return;
            }

            const chosenCourse = systemCoursesMemory.find(c => c.id === selectedId);
            
            const fileLabels = Array.isArray(chosenCourse.file_labels) ? chosenCourse.file_labels : [];
            const fileCount = chosenCourse.required_files !== undefined ? chosenCourse.required_files : fileLabels.length;

            targetCard.style.display = 'block';

            if (fileCount === 0 || fileLabels.length === 0) {
                panelHeader.style.display = 'none';
                wrapper.style.background = 'transparent';
                wrapper.style.border = 'none';
                wrapper.style.padding = '0';
                container.innerHTML = `<div class="no-attachments-badge">✅ This course does not require any attachments.</div>`;
                return;
            }

            // Restore original panels styling context if documents exist
            panelHeader.style.display = 'block';
            wrapper.style.background = '#f8fafc';
            wrapper.style.border = '1px solid #e2e8f0';
            wrapper.style.padding = '15px';
            
            const examples = Array.isArray(chosenCourse.file_examples) ? chosenCourse.file_examples : [];
            let uploadHtml = '';
            
            fileLabels.forEach((label, idx) => {
                const exampleUrl = examples[idx];
                const exampleLinkHtml = exampleUrl ? `<a href="${exampleUrl}" target="_blank">🔗 View Example Template Document</a>` : '';
                
                uploadHtml += `
                    <div class="desc-row">
                        <span>Upload slot for ${label}:</span>
                        <p>Select your file object below (PDF, PNG, JPG).</p>
                        ${exampleLinkHtml}
                        <input type="file" class="applicant-file-input" data-label="${label}" required>
                    </div>
                `;
            });
            container.innerHTML = uploadHtml;
        };

        document.getElementById('enrollmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const courseId = Number(document.getElementById('courseSelect').value);
            if (!courseId) return alert("Please select a valid course destination.");

            const chosenCourse = systemCoursesMemory.find(c => c.id === courseId);
            const fileLabels = Array.isArray(chosenCourse.file_labels) ? chosenCourse.file_labels : [];
            const fileCount = chosenCourse.required_files !== undefined ? chosenCourse.required_files : fileLabels.length;

            const staff_name = document.getElementById('staffName').value.trim();
            const staff_number = document.getElementById('staffNumber').value.trim();
            const phone_number = document.getElementById('phoneNumber').value.trim();
            const institution_name_snapshot = document.getElementById('instName').value.trim();
            const designation_snapshot = document.getElementById('designation').value.trim();
            const specialization_snapshot = document.getElementById('specialization').value.trim();

            let uploadedUrlsArray = [];

            if (fileCount > 0 && fileLabels.length > 0) {
                const fileInputs = document.querySelectorAll('.applicant-file-input');
                
                for (let input of fileInputs) {
                    const fileObj = input.files[0];
                    if (!fileObj) {
                        alert("Please upload all required documentation files.");
                        return;
                    }
                    
                    const cleanFileName = `${Date.now()}_${staff_number}_${fileObj.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
                    
                    const { data: uploadData, error: uploadErr } = await client.storage
                        .from('registrations')
                        .upload(cleanFileName, fileObj);

                    if (uploadErr) {
                        alert(`Storage upload fault: ${uploadErr.message}`);
                        return;
                    }

                    const { data: publicUrlData } = client.storage
                        .from('registrations')
                        .getPublicUrl(cleanFileName);

                    uploadedUrlsArray.push(publicUrlData.publicUrl);
                }
            }

            const { error: insertErr } = await client.from('registrations').insert({
                course_id: courseId,
                staff_name,
                staff_number,
                phone_number,
                institution_name_snapshot,
                designation_snapshot,
                specialization_snapshot,
                file_urls: uploadedUrlsArray
            });

            if (insertErr) {
                alert("Database submission error: " + insertErr.message);
            } else {
                alert("Registration successful!");
                document.getElementById('enrollmentForm').reset();
                handleCourseSelectionChange();
            }
        });

        initPortalDropdown();
    </script>
</body>
</html>
